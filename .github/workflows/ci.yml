on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug OIDC Claims
        run: |
          echo "O owner enviado pelo GitHub é: ${{ github.repository_owner }}"
          echo "A variável cadastrada é: ${{ vars.GCP_WIF_PROVIDER_DEV }}"

  pipeline:
    needs: debug 
    uses: theSamsCo/central-workflows/.github/workflows/pipeline.yaml@v1
    with:
      env: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      app_name: teste
      gar_registry: ${{ vars.GAR_REGISTRY }}
      gcp_wif_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
      gcp_sa: ${{ vars.GCP_SERVICE_ACCOUNT_DEV }}
    secrets: inherit
